name: Build Android APK

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Native Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Web Dependencies
        run: npm install

      - name: Build React/Vite Web App
        run: npm run build

      - name: Initialize & Sync Capacitor Android
        run: |
          # If 'android' directory does not exist, add it
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          # Synchronize build assets and sync plugin configurations
          npx cap sync android

      - name: Build Android Application (APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
